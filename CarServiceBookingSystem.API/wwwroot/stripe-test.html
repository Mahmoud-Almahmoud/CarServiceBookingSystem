<!DOCTYPE html>
<html>
<head>
    <title>Stripe Test</title>
    <script src="https://js.stripe.com/v3/"></script>
</head>
<body>
    <h2>Stripe Test Payment</h2>

    <p id="status">Loading...</p>
    <div id="payment-element"></div>
    <button id="pay">Pay</button>

    <script>
        const stripe = Stripe("pk_test_51TUmUeBRtDDgkfKTy6oSbdZIVvv5fwgzSKX8FosRUiaN3MHYUSCujyRKb9m9EN0TTjoBSeeQnRFAmiTxO8vV3LSh00QKuFPVAu");
        const clientSecret = "pi_3TUrsBBRtDDgkfKT176QSOuL_secret_NQ5auKkH1BAMkTc4IwuzTtsHa";

        const status = document.getElementById("status");
        const payButton = document.getElementById("pay");

        async function init() {
            try {
                const elements = stripe.elements({ clientSecret });
                const paymentElement = elements.create("payment");
                paymentElement.mount("#payment-element");

                status.innerText = "Payment form loaded.";

                payButton.addEventListener("click", async () => {
                    status.innerText = "Processing payment...";

                    const result = await stripe.confirmPayment({
                        elements,
                        confirmParams: {
                            return_url: window.location.origin + "/stripe-test.html"
                        },
                        redirect: "if_required"
                    });

                    if (result.error) {
                        status.innerText = "Error: " + result.error.message;
                        console.error(result.error);
                    } else {
                        status.innerText = "Payment confirmed successfully.";
                        console.log(result);
                    }
                });
            } catch (err) {
                status.innerText = "Init error: " + err.message;
                console.error(err);
            }
        }

        init();
    </script>
</body>
</html>
