name: .NET Build and Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run unit tests
        run: dotnet test CarServiceBookingSystem.Tests --no-build --configuration Release --verbosity normal

      - name: Run integration tests
        run: dotnet test CarServiceBookingSystem.IntegrationTests --no-build --configuration Release --verbosity normal

      - name: Docker build API
        run: docker build -f CarServiceBookingSystem.API/Dockerfile -t car-service-booking-api .
