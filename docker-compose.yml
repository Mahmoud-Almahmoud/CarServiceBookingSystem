services:
  api:
    build:
      context: .
      dockerfile: CarServiceBookingSystem.API/Dockerfile
    container_name: car-service-api
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      ASPNETCORE_ENVIRONMENT: "Development"

      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=CarServiceBookingDb;User Id=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True"

      JwtSettings__Secret: "THIS_IS_A_LONG_DEVELOPMENT_SECRET_KEY_CHANGE_IT_123456789"
      JwtSettings__Issuer: "CarServiceBookingSystem"
      JwtSettings__Audience: "CarServiceBookingSystemUsers"
      JwtSettings__ExpiryMinutes: "60"

      StripeSettings__SecretKey: "sk_test_replace"
      StripeSettings__WebhookSecret: "whsec_replace"
      StripeSettings__Currency: "aed"

      EmailSettings__Host: "smtp.gmail.com"
      EmailSettings__Port: "587"
      EmailSettings__FromEmail: "replace@gmail.com"
      EmailSettings__FromName: "Car Service Booking"
      EmailSettings__Password: "replace"
      EmailSettings__EnableSsl: "true"

    depends_on:
      sqlserver:
        condition: service_started

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: car-service-sql
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "YourStrong!Passw0rd"
    ports:
      - "14333:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'YourStrong!Passw0rd' -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  sqlserver_data: